<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Type More</title>
    <script>
      (function () {
        var isOverlay = window.location.hash.indexOf("/overlay") >= 0;
        if (isOverlay) {
          document.documentElement.setAttribute("data-overlay-route", "1");
        }
      })();
    </script>
    <style>
      html, body, #root {
        height: 100%;
      }
      body {
        margin: 0;
        background:
          radial-gradient(1200px 460px at -12% -8%, #d9ebff 0%, transparent 60%),
          radial-gradient(860px 420px at 110% 0%, #d2f3ff 0%, transparent 55%),
          linear-gradient(145deg, #f3f8ff 0%, #f8fbff 48%, #ecf6ff 100%);
      }
      html[data-overlay-route="1"] body,
      html[data-overlay-route="1"] #root {
        background: transparent !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
